style>
    .loader {
        width: 48px;
        height: 48px;
        border: 5px solid #fff;
        border-bottom-color: #000;
        border-radius: 50%;
        animation: spin 1s linear infinite;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }
</style>
<div class="loader"></div>
