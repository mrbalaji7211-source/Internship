<!DOCTYPE html>
<html>
<head>
<style>
.dropdown {
  position: relative;
  display: inline-block;
}

.menu {
  display: none;
  position: absolute;
  background-color: lightgray;
  padding: 10px;
}

.dropdown:hover .menu {
  display: block;
}
</style>
</head>

<body>

<div class="dropdown">
  Menu
  <div class="menu">
    <p>Item 1</p>
    <p>Item 2</p>
  </div>
</div>

</body>
</html>
